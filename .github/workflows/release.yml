name: Release

on:
  workflow_dispatch:
    inputs:
      refToBuild:
        description: 'Branch, tag or commit SHA1 to build'
        required: true
        type: string
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Building wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Build
      uses: pypa/cibuildwheel@v2.19.2
      env:
        CIBW_ARCHS_MACOS: auto universal2
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  upload_to_pypi:
    name: Uploading to PyPI
    needs: build_wheels
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
    - name: Download
      uses: actions/download-artifact@v4
      with:
        path: dist
    - name: Collect wheels
      run: |
        mkdir -p dist
        # Move all wheel files from subdirectories into dist root
        find dist -type f -name '*.whl' -exec mv -n '{}' dist/ \;
        # Remove now-empty directories left by download-artifact
        find dist -mindepth 1 -type d -empty -delete
    - name: Publish
      uses: pypa/gh-action-pypi-publish@v1.13.0
